# Render Blueprint — provisions the backend (Docker) + a managed PostgreSQL.
# Deploy: push to GitHub, then in Render → "New +" → "Blueprint" → pick this repo.
# Render injects DATABASE_URL from the database automatically; the backend
# normalizes the `postgres://` scheme it provides.
databases:
  - name: inventory-db
    databaseName: inventory
    user: inventory
    plan: free

services:
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        # After deploying the frontend, set this to its URL, e.g.
        # https://your-app.vercel.app  (then redeploy).
        value: "*"
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: SEED_DATA
        value: "true"
