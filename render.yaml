# Render Blueprint — backend web service only (Docker).
# The database is hosted on Neon. Set DATABASE_URL in the Render dashboard to
# your Neon connection string; it's marked `sync: false` so it stays out of the
# repo. The backend normalizes the postgres:// scheme automatically.
services:
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        # After deploying the frontend, set this to its URL, e.g.
        # https://your-app.vercel.app  (then redeploy).
        value: "*"
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: SEED_DATA
        value: "true"
