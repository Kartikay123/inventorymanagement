# Netlify config for the React (Vite) frontend.
# In the Netlify UI set:
#   Base directory:    frontend
#   Environment var:   VITE_API_BASE_URL = https://your-backend.onrender.com
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so client-side routes resolve on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
