# Fly.io config for the backend. Deploy from the backend/ directory:
#   cd backend
#   fly launch --no-deploy          # creates the app (keep this fly.toml)
#   fly postgres create             # then: fly postgres attach <db-name>
#   fly secrets set CORS_ORIGINS="https://your-frontend.vercel.app"
#   fly deploy
# `fly postgres attach` sets DATABASE_URL automatically (postgres:// — the
# backend normalizes it).
app = "inventory-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CORS_ORIGINS = "*"
  LOW_STOCK_THRESHOLD = "10"
  SEED_DATA = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
